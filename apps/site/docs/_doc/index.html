<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文档 - 联储资讯</title>

    <meta name="fedzx-cms-base" content="https://cms.fedzx.com" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css" />
    <style>
      /* Minimal markdown styles (internal docs) */
      .md h1 {
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.2;
        margin: 0.25rem 0 1rem;
      }
      .md h2 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 1.5rem 0 0.75rem;
      }
      .md h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 1.25rem 0 0.5rem;
      }
      .md p {
        margin: 0.75rem 0;
        line-height: 1.8;
      }
      .md ul {
        list-style: disc;
        padding-left: 1.25rem;
        margin: 0.75rem 0;
      }
      .md ol {
        list-style: decimal;
        padding-left: 1.25rem;
        margin: 0.75rem 0;
      }
      .md li {
        margin: 0.35rem 0;
        line-height: 1.8;
      }
      .md hr {
        border: 0;
        border-top: 1px solid #e5e7eb;
        margin: 1.25rem 0;
      }
      .md code {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        padding: 0.1rem 0.35rem;
        border-radius: 0.4rem;
        font-size: 0.9em;
      }
      .md pre {
        background: #0b1020;
        color: #e2e8f0;
        padding: 1rem;
        border-radius: 1rem;
        overflow: auto;
        margin: 1rem 0;
        border: 1px solid #111827;
      }
      .md pre code {
        background: transparent;
        border: 0;
        padding: 0;
        border-radius: 0;
        color: inherit;
      }
      .md a {
        color: #0f172a;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .md strong {
        font-weight: 700;
      }
      .md blockquote {
        border-left: 3px solid #e5e7eb;
        padding-left: 0.9rem;
        margin: 1rem 0;
        color: #334155;
        background: #fafafa;
        border-radius: 0.75rem;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <nav class="navbar-sticky border-b border-gray-100 px-4 py-3">
      <div class="mx-auto max-w-[800px] flex justify-between items-center">
        <a href="/" class="text-lg font-semibold text-gray-900">联储资讯</a>
        <div class="hidden md:flex items-center gap-6 text-sm">
          <a href="/" class="text-gray-700 hover:text-gray-900">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900">最新文章</a>
          <a href="/docs/" class="text-gray-700 hover:text-gray-900">知识库</a>
        </div>
        <button id="mobile-menu-button" class="md:hidden text-gray-700" aria-label="Open menu">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
      <div id="mobile-menu" class="md:hidden hidden py-3 border-t border-gray-100">
        <div class="mx-auto max-w-[800px] flex flex-col gap-2">
          <a href="/" class="text-gray-700 hover:text-gray-900 px-2 py-1">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900 px-2 py-1">最新文章</a>
          <a href="/docs/" class="text-gray-700 hover:text-gray-900 px-2 py-1">知识库</a>
        </div>
      </div>
    </nav>

    <main class="px-4 py-10">
      <div class="mx-auto max-w-[800px]">
        <div class="flex items-start justify-between gap-4">
          <div>
            <a class="text-sm text-gray-700 hover:text-gray-900" href="/docs/">← 返回知识库目录</a>
            <h1 id="doc-title" class="mt-3 text-2xl md:text-3xl font-bold tracking-tight">文档</h1>
          </div>
          <a
            class="rounded-xl border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-50"
            href="https://cms.fedzx.com/admin"
            target="_blank"
            rel="noreferrer"
          >
            返回后台
          </a>
        </div>

        <div id="doc-loading" class="mt-6 rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>
        <div id="doc-error" class="mt-6 hidden rounded-2xl border border-red-200 bg-red-50 p-5 text-red-700"></div>

        <div id="doc-root" class="md mt-6"></div>
      </div>
    </main>

    <footer class="bg-gray-900 text-white py-12">
      <div class="mx-auto max-w-[800px] px-4">
        <div class="border-t border-gray-800 pt-8 text-center">
          <p class="text-gray-400">
            © 2026 联储资讯 版权所有 |
            <a href="https://beian.miit.gov.cn/" target="_blank" class="text-blue-400 hover:text-blue-300" rel="noreferrer">
              京ICP备17065765号&nbsp;
            </a>
          </p>
        </div>
      </div>
    </footer>

    <script src="../../js/site-api.js?v=20260319"></script>
    <script src="../../js/markdown-lite.js?v=20260319"></script>
    <script src="../../js/script.js?v=20260319"></script>
    <script>
      const loadingEl = document.getElementById("doc-loading");
      const errorEl = document.getElementById("doc-error");
      const titleEl = document.getElementById("doc-title");
      const rootEl = document.getElementById("doc-root");

      function showError(msg) {
        if (loadingEl) loadingEl.classList.add("hidden");
        if (errorEl) {
          errorEl.textContent = msg;
          errorEl.classList.remove("hidden");
        }
      }

      function getSlugFromPath() {
        // Normalize multiple slashes to a single slash.
        const p = window.location.pathname.replace(/\/+/g, "/");
        // expected: /docs/<slug>/ or /docs/<slug>
        const parts = p.split("/").filter(Boolean);
        const idx = parts.indexOf("docs");
        if (idx === -1) return "";
        const slug = parts[idx + 1] || "";
        // avoid accidental internal path
        if (!slug || slug === "_doc" || slug === "index.html") return "";
        return slug;
      }

      async function load() {
        const slug = getSlugFromPath();
        if (!slug) {
          window.location.href = "/docs/";
          return;
        }

        try {
          const data = await window.FEDZX.fetchJson("/api/internal/docs/" + encodeURIComponent(slug));
          if (loadingEl) loadingEl.classList.add("hidden");
          if (titleEl && data && data.title) titleEl.textContent = data.title;
          document.title = (data && data.title ? data.title : "文档") + " - 联储资讯";
          if (!rootEl) return;

          const md = (data && data.content) || "";
          rootEl.innerHTML = window.FEDZX.renderMarkdownLite ? window.FEDZX.renderMarkdownLite(md) : "";
        } catch (e) {
          showError("加载失败：文档不存在或 CMS 接口不可用。");
        }
      }

      load();
    </script>
  </body>
</html>
