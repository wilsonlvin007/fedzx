<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联储资讯 - 专注美联储政策与资产配置</title>

    <!-- Production: point to the CMS subdomain on the same server -->
    <meta name="fedzx-cms-base" content="https://cms.fedzx.com" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-white text-gray-900">
    <nav class="navbar-sticky border-b border-gray-100 px-4 py-3">
      <div class="mx-auto max-w-[800px] flex justify-between items-center">
        <div class="flex items-center gap-3">
          <a href="/" class="text-lg font-semibold text-gray-900">联储资讯</a>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm">
          <a href="/" class="text-gray-900 font-medium">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900">最新文章</a>
          <a
            href="https://cms.fedzx.com/admin/login"
            class="text-gray-700 hover:text-gray-900"
            target="_blank"
            rel="noreferrer"
          >
            管理
          </a>
        </div>
        <button id="mobile-menu-button" class="md:hidden text-gray-700" aria-label="Open menu">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
      <div id="mobile-menu" class="md:hidden hidden py-3 border-t border-gray-100">
        <div class="mx-auto max-w-[800px] flex flex-col gap-2">
          <a href="/" class="text-gray-900 font-medium px-2 py-1">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900 px-2 py-1">最新文章</a>
          <a
            href="https://cms.fedzx.com/admin/login"
            class="text-gray-700 hover:text-gray-900 px-2 py-1"
            target="_blank"
            rel="noreferrer"
          >
            管理
          </a>
        </div>
      </div>
    </nav>

    <header class="px-4 pt-10 pb-6">
      <div class="mx-auto max-w-[800px]">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight">联储资讯</h1>
        <p class="mt-3 text-base md:text-lg text-gray-700">专注美联储政策与资产配置</p>
        <div class="mt-6 flex flex-wrap gap-3">
          <a
            href="/articles/"
            class="inline-flex items-center rounded-xl bg-gray-900 text-white px-5 py-3 text-sm font-medium hover:bg-gray-800"
          >
            查看最新文章
          </a>
        </div>
      </div>
    </header>

    <main class="px-4 pb-14">
      <div class="mx-auto max-w-[800px] space-y-10">
        <section>
          <div class="flex items-baseline justify-between gap-4">
            <h2 class="text-xl font-semibold">热门问题</h2>
            <a href="/articles/" class="text-sm text-gray-700 hover:text-gray-900">去看全部文章</a>
          </div>
          <div class="mt-4 grid gap-3" id="home-questions">
            <div class="rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>
          </div>
        </section>

        <section>
          <div class="flex items-baseline justify-between gap-4">
            <h2 class="text-xl font-semibold">最新文章</h2>
            <a href="/articles/" class="text-sm text-gray-700 hover:text-gray-900">查看全部</a>
          </div>
          <div class="mt-4 space-y-3" id="home-latest">
            <div class="rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>
          </div>
        </section>

        <section>
          <h2 class="text-xl font-semibold">分类</h2>
          <div class="mt-4 flex flex-col gap-3">
            <a
              class="rounded-2xl border border-gray-200 bg-white p-5 hover:bg-gray-50"
              href="/articles/?tag=%E6%94%BF%E7%AD%96%E5%88%86%E6%9E%90"
              data-home-tag="政策分析"
            >
              <div class="text-sm text-gray-500">分类</div>
              <div class="mt-1 flex items-center justify-between gap-3">
                <div class="font-medium">政策分析</div>
                <div class="text-sm text-gray-500"><span data-home-tag-count="政策分析">0</span> 篇</div>
              </div>
            </a>
            <a
              class="rounded-2xl border border-gray-200 bg-white p-5 hover:bg-gray-50"
              href="/articles/?tag=%E8%B5%84%E4%BA%A7%E9%85%8D%E7%BD%AE"
              data-home-tag="资产配置"
            >
              <div class="text-sm text-gray-500">分类</div>
              <div class="mt-1 flex items-center justify-between gap-3">
                <div class="font-medium">资产配置</div>
                <div class="text-sm text-gray-500"><span data-home-tag-count="资产配置">0</span> 篇</div>
              </div>
            </a>
            <a
              class="rounded-2xl border border-gray-200 bg-white p-5 hover:bg-gray-50"
              href="/articles/?tag=%E5%B8%82%E5%9C%BA%E8%A7%A3%E8%AF%BB"
              data-home-tag="市场解读"
            >
              <div class="text-sm text-gray-500">分类</div>
              <div class="mt-1 flex items-center justify-between gap-3">
                <div class="font-medium">市场解读</div>
                <div class="text-sm text-gray-500"><span data-home-tag-count="市场解读">0</span> 篇</div>
              </div>
            </a>
          </div>
        </section>

        <section>
          <h2 class="text-xl font-semibold">推荐文章</h2>
          <div class="mt-4 space-y-3" id="home-featured">
            <div class="rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>
          </div>
        </section>
      </div>
    </main>

    <footer class="bg-gray-900 text-white py-12">
      <div class="mx-auto max-w-[800px] px-4">
        <div class="border-t border-gray-800 pt-8 text-center">
          <p class="text-gray-400">
            © 2026 联储资讯 版权所有 |
            <a
              href="https://beian.miit.gov.cn/"
              target="_blank"
              class="text-blue-400 hover:text-blue-300 transition-colors duration-200"
              rel="noreferrer"
            >
              京ICP备17065765号&nbsp;
            </a>
          </p>
        </div>
      </div>
    </footer>

    <script src="js/site-api.js" defer></script>
    <script src="js/home.js" defer></script>
    <script src="js/script.js" defer></script>
  </body>
</html>
