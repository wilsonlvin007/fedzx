<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章详情 - 联储资讯</title>

    <meta name="fedzx-cms-base" content="https://cms.fedzx.com" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-white text-gray-900">
    <nav class="navbar-sticky border-b border-gray-100 px-4 py-3">
      <div class="mx-auto max-w-[800px] flex justify-between items-center">
        <a class="text-lg font-semibold text-gray-900" href="/">联储资讯</a>
        <div class="hidden md:flex items-center gap-6 text-sm">
          <a href="/" class="text-gray-700 hover:text-gray-900">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900">最新文章</a>
        </div>
        <button id="mobile-menu-button" class="md:hidden text-gray-700" aria-label="Open menu">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
      <div id="mobile-menu" class="md:hidden hidden py-3 border-t border-gray-100">
        <div class="mx-auto max-w-[800px] flex flex-col gap-2">
          <a href="/" class="text-gray-700 hover:text-gray-900 px-2 py-1">首页</a>
          <a href="/articles/" class="text-gray-700 hover:text-gray-900 px-2 py-1">最新文章</a>
        </div>
      </div>
    </nav>

    <main class="px-4 py-10">
      <div class="mx-auto max-w-[800px]">
        <a class="text-sm text-gray-700 hover:text-gray-900" href="/articles/">← 返回文章列表</a>

        <article class="mt-6">
          <div id="article-loading" class="rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>

          <header id="article-header" class="hidden">
            <h1 id="article-title" class="text-3xl md:text-4xl font-bold tracking-tight leading-tight"></h1>
            <div class="mt-3 flex flex-wrap items-center gap-2 text-xs text-gray-500">
              <span id="article-date"></span>
              <span class="text-gray-300">·</span>
              <span id="article-slug" class="font-mono"></span>
            </div>

            <div id="article-short-answer" class="mt-6 hidden">
              <div class="rounded-2xl border border-gray-200 bg-gray-50 p-5">
                <div class="text-xs font-semibold text-gray-600">核心结论</div>
                <div id="article-short-answer-text" class="mt-2 text-sm text-gray-900 leading-relaxed"></div>
              </div>
            </div>
          </header>

          <div id="article-body" class="article-body mt-8"></div>

          <div id="article-tags" class="mt-8 hidden">
            <div class="text-sm font-semibold">标签</div>
            <div class="mt-3 flex flex-wrap gap-2" id="article-tags-list"></div>
          </div>

          <section class="mt-10">
            <h2 class="text-lg font-semibold">相关推荐</h2>
            <div class="mt-4 space-y-3" id="article-related">
              <div class="rounded-2xl border border-gray-200 bg-white p-5 text-gray-600">加载中...</div>
            </div>
          </section>
        </article>
      </div>
    </main>

    <footer class="bg-gray-900 text-white py-12">
      <div class="mx-auto max-w-[800px] px-4">
        <div class="border-t border-gray-800 pt-8 text-center">
          <p class="text-gray-400">
            © 2026 联储资讯 版权所有 |
            <a href="https://beian.miit.gov.cn/" target="_blank" class="text-blue-400 hover:text-blue-300" rel="noreferrer">
              京ICP备17065765号&nbsp;
            </a>
          </p>
        </div>
      </div>
    </footer>

    <script src="js/site-api.js" defer></script>
    <script src="js/article-detail.js" defer></script>
    <script src="js/script.js" defer></script>
  </body>
</html>
