server {
  listen 80;
  server_name fedzx.com www.fedzx.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name fedzx.com www.fedzx.com;

  # SSL config is intentionally omitted here because it differs per server.
  # If you use certbot --nginx, it will auto-inject the cert paths.

  root /var/www/fedzx;
  index index.html;

  # Docs knowledge base:
  # - /docs/ serves /var/www/fedzx/docs/index.html
  # - /docs/<slug>/ falls back to /var/www/fedzx/docs/_doc/index.html (static renderer)
  location ^~ /docs/ {
    try_files $uri $uri/ /docs/_doc/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
